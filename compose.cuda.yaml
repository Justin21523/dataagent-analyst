services:
  llama:
    image: ${LLM_CUDA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    gpus: all
    command:
      - -m
      - /models/${LLM_MODEL_FILE:-model.gguf}
      - --alias
      - ${LLM_MODEL_ALIAS:-local-model}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - ${LLM_CONTEXT_SIZE:-4096}
      - --threads
      - ${LLM_THREADS:-8}
      - --n-gpu-layers
      - ${LLM_GPU_LAYERS:-99}
