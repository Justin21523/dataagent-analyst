map $http_x_request_id $dataagent_request_id {
    default $http_x_request_id;
    ""      $request_id;
}

upstream dataagent_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 20m;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SSE 必須停用 proxy buffering，事件才會即時送到瀏覽器。
    location ~ ^/api/agent-jobs/[^/]+/events/stream$ {
        proxy_pass http://dataagent_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $dataagent_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering "no" always;
    }

    location /api/ {
        proxy_pass http://dataagent_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $dataagent_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
